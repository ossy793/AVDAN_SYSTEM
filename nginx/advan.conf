# ADVAN Logistics Platform — Nginx Reverse Proxy
# Place this file in /etc/nginx/sites-available/advan.conf
# then: sudo ln -s /etc/nginx/sites-available/advan.conf /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx
#
# Prerequisites:
#   1. Point your domain A record to this server's IP
#   2. Obtain SSL certificate: sudo certbot --nginx -d advan.yourdomain.com
#   3. Replace "advan.yourdomain.com" with your actual domain throughout
#   4. Uvicorn must be running on 127.0.0.1:8000

# ── Redirect all HTTP → HTTPS ─────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name advan.yourdomain.com;

    # Let's Encrypt ACME challenge passthrough
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main HTTPS server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name advan.yourdomain.com;

    # ── SSL certificates (managed by Certbot) ─────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/advan.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/advan.yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "DENY"                                         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;

    # ── Upload size limit (match MAX_UPLOAD_SIZE_MB in .env) ──────────────
    client_max_body_size 10M;

    # ── Proxy timeouts for long-running operations ─────────────────────────
    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # ── API — proxy to uvicorn ─────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for WebSocket support (real-time location updates)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Uploaded files — served directly by nginx (bypasses Python) ───────
    location /uploads/ {
        alias /path/to/ADVAN2/backend/uploads/;  # ← update to your absolute path
        expires 30d;
        add_header Cache-Control "public, immutable";
        # Restrict to image types only
        location ~* \.(jpg|jpeg|png|webp)$ { }
        location / { return 403; }
    }

    # ── Frontend static files ──────────────────────────────────────────────
    location / {
        root   /path/to/ADVAN2/frontend;  # ← update to your absolute path
        index  customer/index.html;
        try_files $uri $uri/ =404;

        # Aggressive caching for versioned assets
        location ~* \.(css|js|png|jpg|jpeg|webp|ico|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Monnify webhook — allow from Monnify IPs only (recommended) ───────
    # Monnify webhook source IPs (verify latest list in Monnify dashboard)
    # location /api/payment/webhook/monnify {
    #     allow 197.255.224.0/24;   # example — replace with actual Monnify IPs
    #     deny all;
    #     proxy_pass http://127.0.0.1:8000;
    # }

    # ── Block common attack paths ─────────────────────────────────────────
    location ~* \.(env|git|sql|log|bak)$ { return 404; }
    location ~ /\.                        { return 404; }
}
