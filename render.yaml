services:
  - type: web
    name: avdan-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: "AVDAN Logistics Platform"
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: avdan-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: DEMO_MODE
        value: "false"
      - key: ALLOWED_ORIGINS
        value: '["https://your-frontend.vercel.app"]'
      - key: MONNIFY_API_KEY
        sync: false
      - key: MONNIFY_SECRET_KEY
        sync: false
      - key: MONNIFY_CONTRACT_CODE
        sync: false
      - key: MONNIFY_BASE_URL
        value: "https://api.monnify.com"
      - key: MONNIFY_REDIRECT_URL
        value: "https://your-frontend.vercel.app/customer/index.html"
      - key: PLATFORM_FEE_PERCENTAGE
        value: "5.0"
      - key: DELIVERY_BASE_FEE
        value: "500.0"
      - key: HUB_FEE
        value: "100.0"
      - key: UPLOAD_DIR
        value: uploads
      - key: MAX_UPLOAD_SIZE_MB
        value: "5"

databases:
  - name: avdan-db
    databaseName: avdan
    user: avdan
